<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ node_name | upper }} — OTT Sandbox Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f1f5f9;
            --accent: #4f46e5;
            --accent-glow: rgba(79,70,229,0.1);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-accent: #cbd5e1;
            --radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        /* ── Sidebar ── */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-header .avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px;
            color: white;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .sidebar-header .node-info h2 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .sidebar-header .node-info .profile-badge {
            font-size: 11px; color: var(--accent);
            background: rgba(79,70,229,0.1);
            padding: 2px 8px; border-radius: 20px;
            margin-top: 2px; display: inline-block;
            font-weight: 600;
        }
        .contacts-title {
            padding: 16px 20px 8px;
            font-size: 11px; font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }
        .contact-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .contact-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-radius: var(--radius);
            cursor: pointer; transition: all 0.2s;
            margin-bottom: 2px;
            color: var(--text-secondary);
        }
        .contact-item:hover, .contact-item.active {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .contact-item .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #cbd5e1;
            flex-shrink: 0;
        }
        .contact-item .dot.online { background: var(--success); box-shadow: 0 0 8px rgba(16,185,129,0.3); }
        .contact-item .name { font-weight: 500; font-size: 14px; }
        .contact-item .unread-badge {
            background: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: auto;
        }
        /* ── Key Info Panel ── */
        .key-panel {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: #f8fafc;
        }
        .key-panel h4 {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-muted);
            margin-bottom: 8px;
        }
        .key-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .key-row .label { font-size: 12px; color: var(--text-secondary); }
        .key-row .value {
            font-size: 11px; font-family: 'JetBrains Mono', monospace;
            color: var(--accent); max-width: 150px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            font-weight: 500;
        }
        /* ── Main Chat Area ── */
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-secondary);
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .chat-header h3 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .chat-header .status { font-size: 12px; color: var(--success); font-weight: 500; }
        .messages-area {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .msg-bubble {
            max-width: 75%; padding: 12px 16px;
            border-radius: 16px; position: relative;
            animation: fadeIn 0.3s ease;
            box-shadow: var(--shadow);
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .msg-bubble.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-bubble.sent .msg-cipher { color: rgba(255,255,255,0.7); border-top: 1px solid rgba(255,255,255,0.2); }
        .msg-bubble.sent .msg-time { color: rgba(255,255,255,0.7); }
        .msg-bubble.received {
            align-self: flex-start;
            background: white;
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }
        .msg-bubble .msg-sender {
            font-size: 11px; font-weight: 600;
            margin-bottom: 4px; opacity: 0.8;
        }
        .msg-bubble .msg-text { font-size: 14px; line-height: 1.5; }
        .msg-bubble .msg-cipher {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; color: var(--text-muted);
            margin-top: 8px; padding-top: 8px;
            border-top: 1px solid var(--border);
            word-break: break-all;
            max-height: 60px; overflow: hidden;
        }
        .msg-bubble .msg-time {
            font-size: 10px; color: var(--text-muted);
            margin-top: 4px; text-align: right;
        }
        /* ── Input Area ── */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            display: flex; gap: 12px; align-items: center;
        }
        .input-area input {
            flex: 1; padding: 12px 16px;
            border-radius: 24px; border: 1px solid var(--border);
            background: #f1f5f9; color: var(--text-primary);
            font-size: 14px; font-family: 'Inter', sans-serif;
            outline: none; transition: all 0.2s;
        }
        .input-area input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 3px var(--accent-glow); }
        .input-area button {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .input-area button:hover { transform: scale(1.05); box-shadow: 0 4px 12px var(--accent-glow); }
        .input-area button:active { transform: scale(0.95); }
        .input-area button svg { width: 20px; height: 20px; fill: white; }
        /* ── Alert Banner ── */
        .alert-banner {
            padding: 12px 24px;
            background: #fef2f2;
            border-bottom: 1px solid #fee2e2;
            display: flex; align-items: center; gap: 12px;
        }
        .alert-banner .alert-icon { font-size: 20px; }
        .alert-banner .alert-text { font-size: 13px; color: #991b1b; flex: 1; font-weight: 500; }
        .alert-banner .alert-close {
            background: none; border: none; color: #ef4444;
            cursor: pointer; font-size: 18px;
        }
        .empty-chat {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-muted); gap: 16px;
        }
        .empty-chat .icon { font-size: 48px; opacity: 0.2; }
        .empty-chat p { font-size: 14px; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="avatar" id="avatar">{{ node_name[0] | upper }}</div>
            <div class="node-info">
                <h2 id="nodeName">{{ node_name | upper }}</h2>
                <span class="profile-badge" id="profileBadge">safe</span>
            </div>
        </div>
        <div class="contacts-title">Liên hệ</div>
        <div class="contact-list" id="contactList">
            <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">
                Đang tải...
            </div>
        </div>
        <div class="key-panel" id="keyPanel">
            <h4>Thông số Khóa RSA</h4>
            <div class="key-row"><span class="label">n</span><span class="value" id="keyN">—</span></div>
            <div class="key-row"><span class="label">e</span><span class="value" id="keyE">—</span></div>
            <div class="key-row"><span class="label">d</span><span class="value" id="keyD">—</span></div>
            <div class="key-row"><span class="label">bits</span><span class="value" id="keyBits">—</span></div>
            <div class="key-row"><span class="label">padding</span><span class="value" id="keyPadding">—</span></div>
        </div>
    </div>

    <div class="main">
        <div id="alertContainer"></div>
        <div class="chat-header">
            <div>
                <h3 id="chatTitle">Chọn liên hệ để bắt đầu chat</h3>
                <span class="status" id="chatStatus"></span>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="empty-chat">
                <div class="icon">CHAT</div>
                <p>Chọn một liên hệ từ danh sách bên trái để bắt đầu nhắn tin</p>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Nhập tin nhắn..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const NODE_NAME = "{{ node_name }}";
        let selectedContact = null;
        let allMessages = [];
        let lastAlertCount = 0;
        let lastContacts = [];
        let lastOnline = [];
        let lastSeenCount = {};

        function getUnreadCount(contact) {
            const msgs = allMessages.filter(m => m.from === contact);
            const seen = lastSeenCount[contact] || 0;
            return Math.max(0, msgs.length - seen);
        }

        // ── API Calls ──
        async function fetchState() {
            try {
                const r = await fetch('/api/state');
                const data = await r.json();
                updateKeyPanel(data);
                updateAlerts(data.alerts || []);
                allMessages = data.messages || [];
                if (selectedContact) {
                    lastSeenCount[selectedContact] = allMessages.filter(m => m.from === selectedContact).length;
                    renderMessages();
                }
                renderContacts(lastContacts, lastOnline);
                document.getElementById('profileBadge').textContent = data.profile || 'safe';
            } catch(e) { console.error('fetchState:', e); }
        }

        async function fetchContacts() {
            try {
                const r = await fetch('/api/contacts');
                const data = await r.json();
                renderContacts(data.contacts || [], data.online || []);
            } catch(e) { console.error('fetchContacts:', e); }
        }

        function updateKeyPanel(data) {
            const ki = data.key_info || {};
            document.getElementById('keyN').textContent = ki.n || '—';
            document.getElementById('keyE').textContent = ki.e || '—';
            document.getElementById('keyD').textContent = ki.d || '—';
            document.getElementById('keyBits').textContent = ki.key_bits || '—';
            document.getElementById('keyPadding').textContent = data.padding || '—';
        }

        function updateAlerts(alerts) {
            const container = document.getElementById('alertContainer');
            if (alerts.length === lastAlertCount) return;
            lastAlertCount = alerts.length;
            container.innerHTML = alerts.map(a => `
                <div class="alert-banner">
                    <span class="alert-text">${a.message}</span>
                    <button class="alert-close" onclick="clearAlerts()">✕</button>
                </div>
            `).join('');
        }

        async function clearAlerts() {
            await fetch('/api/clear_alerts', {method:'POST'});
            document.getElementById('alertContainer').innerHTML = '';
            lastAlertCount = 0;
        }

        function renderContacts(contacts, online) {
            lastContacts = contacts;
            lastOnline = online;
            const list = document.getElementById('contactList');
            if (contacts.length === 0) {
                list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">Không có liên hệ</div>';
                return;
            }
            list.innerHTML = contacts.map(c => {
                const unread = getUnreadCount(c);
                const badge = unread > 0 ? `<div class="unread-badge">${unread}</div>` : '';
                return `
                <div class="contact-item ${selectedContact===c?'active':''}" onclick="selectContact('${c}')">
                    <div class="dot ${online.includes(c)?'online':''}"></div>
                    <span class="name">${c.charAt(0).toUpperCase()+c.slice(1)}</span>
                    ${badge}
                </div>
                `;
            }).join('');
        }

        function selectContact(name) {
            selectedContact = name;
            lastSeenCount[name] = allMessages.filter(m => m.from === name).length;
            document.getElementById('chatTitle').textContent = name.charAt(0).toUpperCase() + name.slice(1);
            document.getElementById('chatStatus').textContent = 'Online';
            document.getElementById('msgInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('msgInput').focus();
            renderMessages();
            renderContacts(lastContacts, lastOnline);
        }

        function renderMessages() {
            const area = document.getElementById('messagesArea');
            const filtered = allMessages.filter(m =>
                (m.from === selectedContact && m.to === NODE_NAME) ||
                (m.from === NODE_NAME && m.to === selectedContact) ||
                (m.sent && m.to === selectedContact)
            );
            if (filtered.length === 0) {
                area.innerHTML = `<div class="empty-chat"><div class="icon">CHAT</div><p>Bắt đầu cuộc trò chuyện mã hóa với ${selectedContact}</p></div>`;
                return;
            }
            area.innerHTML = filtered.map(m => {
                const isSent = m.from === NODE_NAME || m.sent;
                const text = m._decrypted || m.plaintext || '[encrypted]';
                const cipher = m.ciphertext || '';
                const ts = m.timestamp ? new Date(m.timestamp*1000).toLocaleTimeString('vi') : '';
                return `
                    <div class="msg-bubble ${isSent?'sent':'received'}">
                        <div class="msg-sender">${isSent ? 'Bạn' : m.from}</div>
                        <div class="msg-text">${escapeHtml(text)}</div>
                        <div class="msg-cipher">${cipher.substring(0,80)}${cipher.length>80?'...':''}</div>
                        <div class="msg-time">${ts}</div>
                    </div>
                `;
            }).join('');
            area.scrollTop = area.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !selectedContact) return;
            input.value = '';
            try {
                const r = await fetch('/api/send', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({to: selectedContact, plaintext: text}),
                });
                const data = await r.json();
                if (data.status === 'ok') {
                    await fetchState();
                } else {
                    alert('Lỗi: ' + (data.error || 'Unknown'));
                }
            } catch(e) { alert('Lỗi gửi tin: ' + e); }
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ── Keyboard ──
        document.getElementById('msgInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });

        // ── Polling ──
        fetchState();
        fetchContacts();
        setInterval(fetchState, 2000);
        setInterval(fetchContacts, 5000);
    </script>
</body>
</html>
